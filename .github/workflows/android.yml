name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Show repo structure
      run: ls -R

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    - name: Install SDK
      run: sdkmanager "platforms;android-33" "build-tools;33.0.2"

    - name: Build APK
      run: |
        cd PipePipeClient
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -Dorg.gradle.configuration-cache=false

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: PipePipeClient/app/build/outputs/apk/debug/*.apk
