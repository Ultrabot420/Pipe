name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    - name: Install SDK packages
      run: |
        sdkmanager "platforms;android-33" "build-tools;33.0.2"

    # 🔴 CRITICAL PATCH FOR EXTRACTOR
    - name: Force extractor to Java 8
      run: |
        sed -i '/compileOptions {/a\        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8' PipePipeExtractor/extractor/build.gradle

    - name: Fix Gradle version
      run: |
        cd PipePipeClient
        chmod +x gradlew
        sed -i 's/gradle-7.5-all.zip/gradle-8.5-all.zip/' gradle/wrapper/
