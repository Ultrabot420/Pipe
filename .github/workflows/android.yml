name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Ensure correct Gradle version
      run: |
        cd PipePipeClient
        chmod +x gradlew
        sed -i 's/gradle-7.5-all.zip/gradle-8.5-all.zip/' gradle/wrapper/gradle-wrapper.properties

    - name: Build debug APK
      run: |
        cd PipePipeClient
        ./gradlew clean assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PipePipe-APK
        path: PipePipeClient/app/build/outputs/apk/debug/*.apk
